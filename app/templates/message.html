{% extends "base.html" %}
{% block content %}
<section class="row justify-content-center">
    <div class="col-md-8 col-xl-6">
        <div class="alert {% if is_error %}alert-danger{% else %}alert-success{% endif %} shadow-sm">
            <h1 class="h5 mb-3">{{ title }}</h1>
            <p class="mb-3">{{ message }}</p>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-sm btn-outline-dark">返回首页</a>
                <a href="/upload" class="btn btn-sm btn-warning">继续上传</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
