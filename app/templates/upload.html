{% extends "base.html" %}
{% block content %}
<section class="row justify-content-center">
    <div class="col-xl-9">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 mb-2">上传资源文件</h1>
                <p class="text-secondary mb-4">每个文件都会自动补齐标签（分类、文件格式、外链标记），方便检索与趋势统计。</p>
                <form method="post" action="/upload" enctype="multipart/form-data" class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">标题 *</label>
                        <input type="text" name="title" id="titleInput" class="form-control" maxlength="200" required>
                        <div class="form-text"><span id="titleCharCount">0</span>/200</div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">分类 *</label>
                        <select name="category" class="form-select" required>
                            {% for item in category_items %}
                            <option value="{{ item.key }}">{{ item.icon }} {{ item.label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="描述资源内容、来源、版本信息"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">标签（可选，逗号分隔）</label>
                        <input type="text" name="tags" class="form-control" placeholder="例如：舞台, 鬼畜, 精选">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">作者 / 投稿人</label>
                        <input type="text" name="author" class="form-control" value="匿名用户">
                    </div>
                    <div class="col-12">
                        <label class="form-label">外链地址（可选）</label>
                        <input type="url" name="external_url" class="form-control" placeholder="https://...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">上传文件（可选）</label>
                        <input type="file" name="file" class="form-control">
                        <div class="form-text">支持 MP4/MP3/JPG/PNG/GIF/ZIP 等，最大 200MB</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">封面图（可选）</label>
                        <input type="file" name="preview_image" id="coverInput" class="form-control" accept="image/*">
                        <div id="coverPreview" class="mt-2" style="display:none;">
                            <img id="coverThumb" src="" alt="封面预览" style="max-height:120px;border-radius:8px;border:1px solid #d0d7de;">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="copyrightCheck" required>
                            <label class="form-check-label" for="copyrightCheck">
                                我确认已获得授权并遵守版权与社区规范
                            </label>
                        </div>
                    </div>
                    <div class="col-12 d-flex gap-2 justify-content-end">
                        <a href="/" class="btn btn-outline-secondary">返回首页</a>
                        <button class="btn btn-warning px-4" type="submit">发布资源</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<script>
(function() {
    var titleInput = document.getElementById('titleInput');
    var charCount = document.getElementById('titleCharCount');
    if (titleInput && charCount) {
        titleInput.addEventListener('input', function() {
            charCount.textContent = titleInput.value.length;
        });
    }

    var coverInput = document.getElementById('coverInput');
    var coverPreview = document.getElementById('coverPreview');
    var coverThumb = document.getElementById('coverThumb');
    if (coverInput && coverPreview && coverThumb) {
        coverInput.addEventListener('change', function() {
            var file = coverInput.files[0];
            if (file && file.type.startsWith('image/')) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    coverThumb.src = e.target.result;
                    coverPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                coverPreview.style.display = 'none';
                coverThumb.src = '';
            }
        });
    }
})();
</script>
{% endblock %}
