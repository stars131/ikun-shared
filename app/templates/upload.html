{% extends "base.html" %}
{% block content %}
<section class="row justify-content-center">
    <div class="col-xl-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 mb-3">上传新资源</h1>
                <p class="text-secondary mb-4">支持文件上传或外链分享，推荐补充封面、描述与标签，方便搜索。</p>
                <form method="post" action="/upload" enctype="multipart/form-data" class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">标题 *</label>
                        <input type="text" name="title" class="form-control" maxlength="200" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">分类 *</label>
                        <select name="category" class="form-select" required>
                            {% for key, label in categories %}
                            <option value="{{ key }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="介绍资源内容、来源、适用场景"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">标签</label>
                        <input type="text" name="tags" class="form-control" placeholder="例如：鬼畜,舞台,搞笑">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">作者/投稿人</label>
                        <input type="text" name="author" class="form-control" value="匿名用户">
                    </div>
                    <div class="col-12">
                        <label class="form-label">外链地址（可选）</label>
                        <input type="url" name="external_url" class="form-control" placeholder="https://...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">上传资源文件（可选）</label>
                        <input type="file" name="file" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">封面图（可选）</label>
                        <input type="file" name="preview_image" class="form-control">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="copyrightCheck" required>
                            <label class="form-check-label" for="copyrightCheck">
                                我确认已获得授权并遵守版权法规
                            </label>
                        </div>
                    </div>
                    <div class="col-12 d-grid d-md-flex justify-content-md-end gap-2">
                        <a href="/" class="btn btn-outline-secondary">返回首页</a>
                        <button class="btn btn-warning px-4" type="submit">发布资源</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
