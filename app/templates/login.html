<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <!-- Left Panel -->
    <div class="auth-left">
        <div class="auth-left-content">
            <a href="/" class="auth-brand">🐔 IKUN Shared</a>
            <p class="auth-slogan">分享视频、歌曲、图片、表情包与素材的社区平台</p>
            <div class="auth-particles">
                <span class="auth-particle ap1"></span>
                <span class="auth-particle ap2"></span>
                <span class="auth-particle ap3"></span>
            </div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
        <div class="auth-form-wrapper">
            <!-- Tab Navigation -->
            <div class="auth-tabs">
                <button class="auth-tab {% if active_tab != 'register' %}active{% endif %}" data-tab="login" type="button">登录</button>
                <button class="auth-tab {% if active_tab == 'register' %}active{% endif %}" data-tab="register" type="button">注册</button>
                <div class="auth-tab-indicator"></div>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="auth-error" id="authError">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Login Form -->
            <form class="auth-form {% if active_tab != 'register' %}active{% endif %}" id="loginForm" action="/login" method="post">
                <h2 class="auth-form-title">欢迎回来</h2>
                <div class="auth-field">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" name="username" required autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="auth-field">
                    <label for="loginPassword">密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="请输入密码">
                        <button type="button" class="password-toggle" data-target="loginPassword">👁</button>
                    </div>
                </div>
                <button type="submit" class="auth-submit">登录</button>
                {% if linuxdo_oauth_enabled %}
                <div class="oauth-divider"><span>或</span></div>
                <a href="/auth/linuxdo" class="auth-oauth-btn">使用 LinuxDO 登录</a>
                {% endif %}
                <p class="auth-switch">没有账号？<a href="#" data-switch-tab="register">立即注册</a></p>
            </form>

            <!-- Register Form -->
            <form class="auth-form {% if active_tab == 'register' %}active{% endif %}" id="registerForm" action="/register" method="post">
                <h2 class="auth-form-title">创建账号</h2>
                <div class="auth-field">
                    <label for="regUsername">用户名 <span class="field-hint">(3-30 个字符)</span></label>
                    <input type="text" id="regUsername" name="username" required minlength="3" maxlength="30" autocomplete="username" placeholder="字母、数字、下划线或中文">
                </div>
                <div class="auth-field">
                    <label for="regDisplayName">显示名称 <span class="field-hint">(可选)</span></label>
                    <input type="text" id="regDisplayName" name="display_name" maxlength="100" autocomplete="name" placeholder="其他用户看到的名字">
                </div>
                <div class="auth-field">
                    <label for="regPassword">密码 <span class="field-hint">(至少 6 个字符)</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" name="password" required minlength="6" autocomplete="new-password" placeholder="请输入密码">
                        <button type="button" class="password-toggle" data-target="regPassword">👁</button>
                    </div>
                </div>
                <div class="auth-field">
                    <label for="regPasswordConfirm">确认密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPasswordConfirm" name="password_confirm" required minlength="6" autocomplete="new-password" placeholder="再次输入密码">
                        <button type="button" class="password-toggle" data-target="regPasswordConfirm">👁</button>
                    </div>
                    <div class="field-error" id="passwordMismatch" style="display:none">两次输入的密码不一致</div>
                </div>
                <button type="submit" class="auth-submit">注册</button>
                {% if linuxdo_oauth_enabled %}
                <div class="oauth-divider"><span>或</span></div>
                <a href="/auth/linuxdo" class="auth-oauth-btn">使用 LinuxDO 快速登录</a>
                {% endif %}
                <p class="auth-switch">已有账号？<a href="#" data-switch-tab="login">去登录</a></p>
            </form>
        </div>
    </div>
</div>

<script>
(() => {
    // Tab switching
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');
    const indicator = document.querySelector('.auth-tab-indicator');
    const switchLinks = document.querySelectorAll('[data-switch-tab]');

    function switchTab(tabName) {
        tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
        forms.forEach(f => {
            f.classList.toggle('active', f.id === (tabName === 'login' ? 'loginForm' : 'registerForm'));
        });
        updateIndicator();
        const errorEl = document.getElementById('authError');
        if (errorEl) errorEl.style.display = 'none';
    }

    function updateIndicator() {
        const activeTab = document.querySelector('.auth-tab.active');
        if (activeTab && indicator) {
            indicator.style.left = activeTab.offsetLeft + 'px';
            indicator.style.width = activeTab.offsetWidth + 'px';
        }
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    switchLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            switchTab(link.dataset.switchTab);
        });
    });

    // Hash-based tab activation
    if (window.location.hash === '#register') {
        switchTab('register');
    }

    // Initial indicator position
    updateIndicator();
    window.addEventListener('resize', updateIndicator);

    // Password toggle
    document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = document.getElementById(btn.dataset.target);
            if (input) {
                input.type = input.type === 'password' ? 'text' : 'password';
                btn.textContent = input.type === 'password' ? '👁' : '🙈';
            }
        });
    });

    // Password confirmation check
    const regForm = document.getElementById('registerForm');
    const regPass = document.getElementById('regPassword');
    const regConfirm = document.getElementById('regPasswordConfirm');
    const mismatchEl = document.getElementById('passwordMismatch');

    if (regForm && regPass && regConfirm) {
        regForm.addEventListener('submit', (e) => {
            if (regPass.value !== regConfirm.value) {
                e.preventDefault();
                mismatchEl.style.display = 'block';
                regConfirm.focus();
            }
        });
        regConfirm.addEventListener('input', () => {
            mismatchEl.style.display = (regPass.value && regConfirm.value && regPass.value !== regConfirm.value) ? 'block' : 'none';
        });
    }

    // Error shake animation
    const errorEl = document.getElementById('authError');
    if (errorEl) {
        errorEl.classList.add('shake');
        setTimeout(() => errorEl.classList.remove('shake'), 500);
    }
})();
</script>
</body>
</html>
