<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary-subtle sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">IKUN Shared</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">分类资源</a></li>
                <li class="nav-item"><a class="nav-link" href="/trending">趋势榜</a></li>
                <li class="nav-item"><a class="nav-link" href="/upload">上传资源</a></li>
            </ul>
            <span class="navbar-text text-secondary small">GitHub 风格分类 · 文件标签化</span>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="py-4 border-top border-secondary-subtle">
    <div class="container text-center text-secondary small">
        <p class="mb-1">IKUN Shared · 分享视频、歌曲、图片、表情包与素材</p>
        <p class="mb-0">请仅上传合法授权内容，平台支持侵权下架。</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
