<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary-subtle">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="/">IKUN 分享站</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">资源大厅</a></li>
                <li class="nav-item"><a class="nav-link" href="/upload">上传资源</a></li>
            </ul>
            <span class="navbar-text text-light small">视频 · 歌曲 · 图片 · 表情包</span>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="py-4 border-top border-secondary-subtle">
    <div class="container text-center text-secondary small">
        <p class="mb-1">IKUN 资源分享站 · 为热爱而分享</p>
        <p class="mb-0">请遵守版权法规，仅上传合法授权内容。</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
