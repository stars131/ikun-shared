<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IKUN Shared - 分享视频、歌曲、图片、表情包与素材的资源站">
    <title>{{ title }}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary-subtle sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">IKUN Shared</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/browse' %}active{% endif %}" href="/browse">分类资源</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/trending' %}active{% endif %}" href="/trending">趋势榜</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/upload' %}active{% endif %}" href="/upload">上传资源</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/settings' %}active{% endif %}" href="/settings">设置</a></li>
            </ul>
            {% if current_user %}
                <span class="navbar-text text-light me-2">{{ current_user.username }}</span>
                <form action="/logout" method="post" class="d-inline mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">退出</button>
                </form>
            {% else %}
                <a href="/login" class="btn btn-sm btn-outline-light me-1">登录</a>
                <a href="/login#register" class="btn btn-sm btn-warning">注册</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="bg-dark text-light py-4 mt-auto">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 mb-2 mb-md-0">
                <strong>IKUN Shared</strong>
                <p class="text-secondary small mb-0 mt-1">分享视频、歌曲、图片、表情包与素材</p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="text-secondary small mb-1">请仅上传合法授权内容，平台支持侵权下架。</p>
                <p class="text-secondary small mb-0">&copy; 2024-2026 IKUN Shared</p>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/preferences.js" defer></script>
<script src="/static/js/interactions.js" defer></script>
</body>
</html>
